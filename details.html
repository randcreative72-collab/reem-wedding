<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>تفاصيل الحفل</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <a href="index.html" class="back-btn">
    ← الرجوع
</a>

<section id="details-page">

    <div class="details-overlay"></div>

    <div class="timeline-container fade-up">

        <!-- عنوان التفاصيل -->

        <img src="assets/images/details-name.png"
             class="details-name"
             alt="">

        <!-- الخط -->

        <div class="timeline-line"></div>

        <!-- النقاط -->

        <span class="dot dot1"></span>
        <span class="dot dot2"></span>
        <span class="dot dot3"></span>
        <span class="dot dot4"></span>

        <!-- السيارة -->

        <div class="timeline-item left item1">

            <img src="assets/images/car.png"
                 class="timeline-icon"
                 alt="">

            <div class="timeline-text">

                <h3>الزفّة</h3>

                <p>5:00 مساءً</p>

            </div>

        </div>

        <!-- بداية الحفل -->

        <div class="timeline-item right item2">

            <img src="assets/images/hall.png"
                 class="timeline-icon"
                 alt="">

            <div class="timeline-text">

                <h3>بداية الحفل</h3>

                <p>7:00 مساءً</p>

            </div>

        </div>

        <!-- العشاء -->

        <div class="timeline-item left item3">

         <img src="assets/images/dinner.png"
     class="timeline-icon dinner-icon"
     alt="">

            <div class="timeline-text">

                <h3>العشاء</h3>

                <p>9:00 مساءً</p>

            </div>

        </div>

        <!-- الكيك -->

        <div class="timeline-item right item4">

          <img src="assets/images/cake.png"
     class="timeline-icon cake-icon"
     alt="">
            <div class="timeline-text">

                <h3>تقطيع قالب الكيك</h3>

                <p>10:00 مساءً</p>

            </div>

        </div>

    </div>
   

</section>
<!--====================================-->
<!-- موقع الحفل -->
<!--====================================-->

<section id="location">

    <div class="location-container fade-up">

        <h2 class="location-title">
            موقع الحفل
        </h2>

        <img src="assets/images/Deep-House-Venue.jpeg"
             class="location-image"
             alt="Deep House Venue">

        <h3 class="location-name">
            Deep House Venue
        </h3>

        <p class="location-address">
            📍 عمّان - الأردن
        </p>

        <a href="https://www.google.com/maps/place/Deep+House+Venue/@31.8785806,35.7852639,17z/data=!4m6!3m5!1s0x151ca51e03b0c7c5:0xde146ec26766f739!8m2!3d31.8785806!4d35.7878388!16s%2Fg%2F11nh_1nqk2?entry=ttu"
           target="_blank"
           class="location-btn">

            عرض الموقع على الخريطة

        </a>

    </div>
   <div class="details-footer">

    <a href="https://docs.google.com/forms/d/e/1FAIpQLScKyUX1yhwun6GuuKNPkGCBetxqHu31m4FZAYQsaZNFjkMWgA/viewform?usp=header"
   class="next-btn"
   target="_blank">

    تأكيد الحضور →

</a>

</div>
</section>
</body>

</html>
