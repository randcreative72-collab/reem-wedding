<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>دعوة الزفاف</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- الخلفية -->
    <div class="overlay"></div>

    <!-- ========================= -->
    <!-- السكشن الأول -->
    <!-- ========================= -->

    <section id="intro">

       <div class="container">

    <img src="assets/images/logo.png"
         class="main-logo"
         alt="Logo">

    <img src="assets/images/envelope-closed.png"
         id="envelope"
         class="envelope">

    <p class="open-text">
        اضغط لفتح الدعوة
    </p>

</div>

    </section>


    <!-- ========================= -->
    <!-- السكشن الثاني -->
    <!-- ========================= -->

  <section id="music-section">

    <img src="assets/images/flower.png"
         class="flower flower-left"
         alt="">

    <img src="assets/images/flower.png"
         class="flower flower-right"
         alt="">

    <div class="music-envelope">

        <!-- الظرف مع الكرت -->
        <img src="assets/images/envelope-card.png"
             class="music-envelope-img"
             alt="">

        <!-- السي دي -->
        <div class="cd-wrapper">

    <!-- صورة الموسيقى -->
    <img src="assets/images/music.png"
         class="music-icon"
         alt="">

    <!-- القرص -->
    <img src="assets/images/cd.png"
         id="cd"
         alt="">

    <!-- زر التشغيل -->
    <img src="assets/images/play.png"
         class="play-icon"
         alt="">

</div>
            <span class="cd-text">
                اضغط هنا
            </span>

        </div>

    </div>

    <audio id="music">
        <source src="assets/audio/music.mp3" type="audio/mp3">
    </audio>

</section>

    <!-- ========================= -->
    <!-- السكشن الثالث -->
    <!-- ========================= -->

   <section id="card-section">

    <div class="card-container">

        <img
            src="assets/images/card.png"
            class="card-image"
            alt="Invitation Card">

    </div>

</section>


  <!-- ========================= -->
<!-- السكشن الرابع -->
<!-- ========================= -->

<section id="countdown-section">

    <div class="countdown-wrapper">

       <h2 class="count-title">
    Until We Say "I Do"
</h2>

        <div class="countdown">

            <div class="time-box">
                <span id="days">00</span>
                <small>Days</small>
            </div>

            <span class="separator">:</span>

            <div class="time-box">
                <span id="hours">00</span>
                <small>Hours</small>
            </div>

            <span class="separator">:</span>

            <div class="time-box">
                <span id="minutes">00</span>
                <small>Minutes</small>
            </div>

            <span class="separator">:</span>

            <div class="time-box">
                <span id="seconds">00</span>
                <small>Seconds</small>
            </div>

        </div>

    </div>

</section>


    <script src="script.js"></script>

</body>

</html>
<section id="details-section">

    <div class="details-container">

        <!-- الكرت -->
        <img src="assets/images/details-card.jpeg"
             class="details-card"
             alt="">

        <!-- ستكر التفاصيل -->
        <a href="details.html" class="details-link">

            <img src="assets/images/details.png"
                 class="details-sticker"
                 alt="">

        </a>

        <!-- ستكر تأكيد الحضور -->
    <a href="https://docs.google.com/forms/d/e/1FAIpQLScKyUX1yhwun6GuuKNPkGCBetxqHu31m4FZAYQsaZNFjkMWgA/viewform?usp=header"
   class="confirm-link"
   target="_blank">

    <img src="assets/images/confirm-sticker.png"
         class="confirm-sticker"
         alt="تأكيد الحضور">

</a>

        <!-- ✨ أضيفي الزهور هون بالضبط ✨ -->

        <img src="assets/images/flower.png"
             class="d-flower flower-1"
             alt="">

        <img src="assets/images/flower.png"
             class="d-flower flower-2"
             alt="">

        <img src="assets/images/flower.png"
             class="d-flower flower-3"
             alt="">

        <img src="assets/images/flower.png"
             class="d-flower flower-4"
             alt="">

    </div>

</section>
